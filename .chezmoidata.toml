# =============================================================================
# .chezmoidata.toml — Canonical Package Matrix
# =============================================================================
# Single source of truth for all package data.
# Edit this file to add, remove, or move packages.
# The install script (00-install-core.sh.tmpl) and brewfile.tmpl build their
# arrays by filtering this data at template render time.
#
# Fields:
#   name     — package name as used by the package manager
#   managers — which managers deliver this package:
#              brew-formula | brew-cask | apt | snap | pacman | aur | dnf
#   machines — which machine types receive this package:
#              workstation | terminal | server
#
# Notes:
#   - Name splits (same tool, different name per manager) are separate entries.
#     Example: "fd" (brew/pacman) and "fd-find" (apt/dnf) are two entries.
#   - GNOME-conditional packages (darkman, xdg-desktop-portal-gtk) are NOT in
#     this file — they depend on a runtime env var (XDG_CURRENT_DESKTOP) that
#     cannot be expressed as a machine type. They are appended explicitly in the
#     install script under a GNOME template conditional.
#   - snap and aur are separate install mechanisms, not mixed with apt/pacman.
# =============================================================================

