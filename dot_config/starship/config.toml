# Activates the color aliases defined at the bottom of this file
palette = "tokyonight_moon"

# Line 1 (left):  [os В· user В· host] в–¶ [dir] в–¶ [branch В· commit] [git_status]  в”Җв”Җ fill в”Җв”Җ
# Line 1 (right): [lang runtimes] в–¶ [package] в–¶ [duration] в–¶ [time]
# Line 2:         вқҜвқҜ $character
format = """
[оӮҫ](fg:blue7)\
$os\
$username\
$hostname\
[оӮё](bg:blue fg:blue7)\
$directory\
[оӮё](bg:blue0 fg:blue)\
$git_branch\
$git_commit\
[оӮё](fg:blue0)\
$git_status\
$fill\
[оӮә](fg:green2)\
$c\
$conda\
$container\
$docker_context\
$golang\
$java\
$lua\
$nodejs\
$python\
$ruby\
$rust\
$terraform\
[оӮј](bg:teal fg:green2)\
$package\
[оӮј](bg:term_yellow_bright fg:teal)\
$cmd_duration\
[оӮј](fg:term_yellow_bright)\
$line_break\
$line_break\
[оӮ» ](fg:blue7 bold)\
$shlvl\
$character\
[оӮ» ](fg:blue7 bold)"""

# в”Җв”Җ Segment 1 В· bg:blue7 (dark navy) в”Җв”Җ os icon В· username В· hostname в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled  = false
style     = "bg:blue7 fg:ui_fg bold"
format    = "[ $symbol ]($style)"

[username]
style_user  = "bg:blue7 fg:ui_fg bold"
style_root  = "bg:blue7 fg:ui_warning bold"
format      = "[ $user]($style)"

[hostname]
ssh_symbol  = "о¬Ғ "
style       = "bg:blue7 fg:ui_fg bold"
format      = "[@$hostname ]($style)"

# в”Җв”Җ Segment 2 В· bg:term_white (muted purple) в”Җв”Җ current directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
read_only           = " у°Ңҫ"
truncation_length   = 5
truncation_symbol   = "вҖҰ/"
truncate_to_repo    = true
style               = "bg:blue fg:ui_bg bold"
format              = "[ $path$read_only ]($style)"

# в”Җв”Җ Segment 3 В· bg:blue (bright blue) в”Җв”Җ git branch В· commit hash/tag в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol  = "пҗҳ "
style   = "bg:blue0 fg:ui_fg bold"
format  = '[ $symbol$branch(:$remote_branch)]($style)'

[git_commit]
only_detached       = false  # show hash on normal branches too, not just detached HEAD
tag_disabled        = false
tag_max_candidates  = 1
style               = "bg:blue0 fg:ui_fg bold"
format              = "[@$hash$tag ]($style)"

# в”Җв”Җ Segment 4 В· no bg (floating) в”Җв”Җ git status indicators, each colored by state в”Җ
[git_status]
ahead       = "[ пӮӘ ${count} оӮ№](fg:blue5 bold)"
behind      = "[ пӮ« ${count} оӮ№](fg:yellow bold)"
conflicted  = "[ у°үҖ ${count} оӮ№](fg:red bold)"
deleted     = "[ у°Ҷҙ ${count} оӮ№](fg:red bold)"
diverged    = "[ у°ғ» ${count} оӮ№](fg:red1 bold)"
modified    = "[ у°ӨҖ ${count} оӮ№](fg:blue0 bold)"
renamed     = "[ пҒҺ ${count} оӮ№](fg:blue1 bold)"
staged      = "[ пҒ• ${count} оӮ№](fg:green bold)"
stashed     = "[ у°Ҹ” ${count} оӮ№](fg:green1 bold)"
untracked   = "[ уұ§Ҡ ${count} оӮ№](fg:magenta2 bold)"
style       = "fg:ui_bg bold"
format      = "[$all_status$ahead_behind ]($style)"

[fill]
symbol = " "

# в”Җв”Җ Right side ($fill pushes these to the right edge) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# в”Җв”Җ Segment 5 В· bg:green2 (teal-green) в”Җв”Җ active language runtime versions в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[c]
symbol  = "оҳһ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[conda]
ignore_base = false  # default hides "base" env; keep it visible
symbol      = "оң• "
style       = "bg:green2 fg:ui_bg bold italic"
format      = '[ $symbol$environment ]($style)'

[container]
style   = "bg:green2 fg:ui_bg bold italic"
format  = "[ $symbol\\[$name\\] ]($style)"

[docker_context]
#only_with_files = true  # commented out so context always shows, not just next to Dockerfiles
symbol          = "пҢҲ "
style           = "bg:green2 fg:ui_bg bold italic"
format          = "[ $symbol$context ]($style)"

[golang]
symbol  = "у°ҹ“ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[java]
symbol  = "оҷӯ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[lua]
symbol  = "оҳ  "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[nodejs]
symbol  = "оҙҚ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[python]
pyenv_prefix  = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]  # local venv detected without activation
symbol        = "оҲө "
style         = "bg:green2 fg:ui_bg bold italic"
format        = "[ $symbol$version(\\($virtualenv\\)) ]($style)"

[ruby]
symbol  = "оһ‘ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[rust]
symbol  = "уұҳ— "
style   = "bg:green2 fg:ui_bg bold italic"
format  = '[ $symbol$version ]($style)'

[terraform]
symbol  = "оўҪ "
style   = "bg:green2 fg:ui_bg bold italic"
format  = "[ $symbol$version:$workspace ]($style)"

# в”Җв”Җ Segment 6 В· bg:teal в”Җв”Җ package version (from manifest in cwd) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[package]
symbol  = "о¬© "
style   = "bg:teal fg:ui_bg bold italic"
format  = "[ $symbol$version:$workspace ]($style)"

# в”Җв”Җ Segment 7 В· bg:term_yellow_bright в”Җв”Җ last command duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
style   = "bg:term_yellow_bright fg:ui_bg bold italic"
format  = "[ уұҰҹ$duration ]($style)"

# в”Җв”Җ Line 2 в”Җв”Җ nesting depth В· prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[shlvl]
disabled      = false
repeat        = true
repeat_offset = 1  # shows shlvl-1 symbols: silent at level 1, one вқҜ at level 2, etc.
symbol        = "вқҜ"
format        = "[$symbol](bold)"

# в”Җв”Җ Misc в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# OS Symbols
