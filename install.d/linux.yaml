- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.profile: sh/profile
    ~/.bashrc: sh/bashrc
    ~/.zshrc: sh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gitconfig: git/gitconfig

- shell:
    -
      description: "Installing your environment..."
      command: "./bin/dotfiles_env_install"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Updating your environment..."
      command: "./bin/dotfiles_env_update"
      stdout: true
      stderr: true
      stdin: true

