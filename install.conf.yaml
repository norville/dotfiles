- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gvimrc: vim/gvimrc.vim
    ~/.gitconfig: git/gitconfig
    ~/.atom: atom

- shell:
    -
      description: "Installing Homebrew and its formulae..."
      command: "./brew/brew.sh"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Setting up ZSH..."
      command: "./zsh/zsh.sh"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Setting up dev environments..."
      command: "./update_dev_env.sh"
      stdout: true
      stderr: true
      stdin: true

