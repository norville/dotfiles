- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.zsh-completions: zsh/completions
    ~/.tmux.conf: tmux/tmux.conf
    ~/.ssh: ssh
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gitconfig: git/gitconfig
    ~/.iterm: iterm
    ~/Library/Application\ Support/Code/User: vscode/user

- shell:
    -
      description: "Configuring your environment..."
      command: "./bin/dotfiles_env_set"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Updating your environment..."
      command: "./bin/dotfiles_env_update"
      stdout: true
      stderr: true
      stdin: true

