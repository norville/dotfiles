- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gvimrc: vim/gvimrc.vim
    ~/.gitconfig: git/gitconfig
    ~/.atom: atom

- shell:
    - [git submodule update --init --recursive, Installing submodules...]
    - [./brew/brew.sh, Installing Homebrew and its formulae...]
    - [./zsh/zsh.sh, Setting up ZSH...]
    - [./update_dev_env.sh, Setting up dev environments...]
