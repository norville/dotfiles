- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gitconfig: git/gitconfig
    ~/.atom: atom
    ~/.iterm: iterm

- shell:
    -
      description: "Configuring your environment..."
      command: "./bin/set_env.sh"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Updating your environment..."
      command: "./bin/update_env.sh"
      stdout: true
      stderr: true
      stdin: true

