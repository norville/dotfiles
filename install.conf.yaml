- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc: zshrc
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gvimrc: vim/gvimrc.vim
    ~/.gitconfig: git/gitconfig

- shell:
  - [git submodule update --init --recursive, Installing submodules]
