- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gitconfig: git/gitconfig
    ~/.atom: atom
    ~/.iterm: iterm

- shell:
    -
      description: "Installing Homebrew and its formulae..."
      command: "./brew/brew.sh"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Setting up ZSH..."
      command: "./zsh/set_zsh.sh"
      stdout: true
      stderr: true
      stdin: true

    -
      description: "Setting up dev environments..."
      command: "./update_env.sh"
      stdout: true
      stderr: true
      stdin: true

