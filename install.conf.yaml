- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zshrc: zsh/zshrc
    ~/.tmux.conf: tmux/tmux.conf
    ~/.vim: vim
    ~/.vimrc: vim/vimrc.vim
    ~/.gvimrc: vim/gvimrc.vim
    ~/.gitconfig: git/gitconfig

- shell:
    - [git submodule update --init --recursive, Installing submodules...]
    - [xcode-select --install, Installing XCode Command Line Tools...]
    - [./brew/brew.sh, Installing Homebrew and its formulas...]
    - [./zsh/zsh.sh, Setting up ZSH...]
    - [./update_dev_env.sh, Setting up dev environments...]
    - [pip3 install powerline-status, Installing Powerline...]
    #TODO install fonts
    #TODO setup iterm
    #TODO setup atom
